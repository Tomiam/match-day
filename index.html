<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saints vs Blues: Vibe Match</title>
    <style>
        :root { --saints: #d71920; --blues: #0000ff; }
        body { font-family: 'Arial Black', sans-serif; background: #0a0a0a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .game-container { background: #1a1a1a; width: 450px; padding: 30px; border-radius: 20px; text-align: center; border: 3px solid #333; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
        .btn { padding: 15px; margin: 8px 0; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; width: 100%; font-size: 1.1rem; text-transform: uppercase; transition: 0.2s; box-shadow: 0 4px 0 rgba(0,0,0,0.3); }
        .btn:active { transform: translateY(2px); box-shadow: none; }
        .saints-btn { background: var(--saints); color: white; }
        .blues-btn { background: var(--blues); color: white; }
        .score-board { display: flex; justify-content: space-around; font-size: 3.5rem; margin: 15px 0; background: #000; padding: 15px; border-radius: 12px; border: 2px solid #d71920; }
        #scenario { font-size: 1.1rem; margin-bottom: 20px; color: #fbbf24; height: 4em; display: flex; align-items: center; justify-content: center; font-style: italic; }
        #log { margin-top: 20px; min-height: 100px; color: #fff; background: #262626; padding: 15px; border-radius: 8px; border-left: 5px solid #444; text-align: left; font-family: 'Courier New', Courier, monospace; }
        .goal-alert { color: #2ecc71; font-weight: bold; }
        .conceded-alert { color: #e74c3c; font-weight: bold; }
        .commentary { color: #9ca3af; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="game-container">
    <div id="setup">
        <h1>Match Day Vibe</h1>
        <p>Select your Club:</p>
        <button class="btn saints-btn" onclick="startGame('Southampton')">Southampton FC</button>
        <button class="btn blues-btn" onclick="startGame('Birmingham City')">Birmingham City</button>
    </div>

    <div id="gameplay" style="display:none;">
        <div class="score-board">
            <span id="s-score">0</span>:<span id="b-score">0</span>
        </div>
        <div id="scenario"></div>
        <div id="choices"></div>
        <div id="log">The teams are coming out of the tunnel...</div>
    </div>
</div>

<script>
    let playerTeam = "";
    let scores = { "Southampton": 0, "Birmingham City": 0 };
    let turn = 0;

    const generalCommentary = [
        "The manager is pacing the touchline furiously.",
        "The noise from the away end is deafening right now!",
        "A heavy challenge in midfield, but the ref waves play on.",
        "The rain is starting to slick the pitch, making it fast.",
        "Tactical instructions being shouted from the bench.",
        "The tension in the stadium is palpable."
    ];

    function startGame(team) {
        playerTeam = team;
        document.getElementById('setup').style.display = 'none';
        document.getElementById('gameplay').style.display = 'block';
        updateUI();
    }

    function updateUI() {
        const opponent = playerTeam === "Southampton" ? "Birmingham City" : "Southampton";
        
        if (turn === 0) {
            renderTurn("KICKOFF: The referee blows the whistle! St Mary's is rocking. How do we start?", [
                { name: "High Press Frenzy", risk: 0.7, reward: 0.6, desc: "Sprinting at the defenders!" },
                { name: "Controlled Possession", risk: 0.2, reward: 0.3, desc: "Building from the back." }
            ]);
        } else if (turn === 1) {
            renderTurn("60 MINUTES: The game is stretched. The Blues are looking dangerous on the break!", [
                { name: "Fast Break", risk: 0.6, reward: 0.6, desc: "A blistering counter-attack!" },
                { name: "Tactical Subs", risk: 0.3, reward: 0.4, desc: "Refreshing the legs." }
            ]);
        } else if (turn === 2) {
            let options = [];
            if (scores[playerTeam] > scores[opponent]) {
                options = [
                    { name: "Park the Bus 🚌", risk: 0.4, reward: 0.1, desc: "Wasting time at the corner flag!" },
                    { name: "Go for the killer goal", risk: 0.8, reward: 0.6, desc: "Counter attacking with pace!" }
                ];
            } else if (scores[playerTeam] === scores[opponent]) {
                options = [
                    { name: "Settle for the point", risk: 0.1, reward: 0.05, desc: "Playing it safe in defense." },
                    { name: "All-out for the winner", risk: 0.9, reward: 0.8, desc: "Everyone in the box!" }
                ];
            } else {
                options = [
                    { name: "Long Ball Overload", risk: 0.9, reward: 0.8, desc: "The keeper is coming up for the corner!" },
                    { name: "Desperation Long Shots", risk: 0.7, reward: 0.4, desc: "Firing from distance!" }
                ];
            }
            renderTurn("FINAL MINUTES: The fourth official signals added time! It's now or never!", options);
        } else {
            endGame();
        }
    }

    function renderTurn(text, options) {
        document.getElementById('scenario').innerText = text;
        let html = "";
        options.forEach((opt) => {
            html += `<button class="btn ${playerTeam === 'Southampton' ? 'saints-btn' : 'blues-btn'}" onclick="resolveTurn(${opt.risk}, ${opt.reward}, '${opt.desc}')">${opt.name}</button>`;
        });
        document.getElementById('choices').innerHTML = html;
    }

    function resolveTurn(risk, reward, desc) {
        const opponent = playerTeam === "Southampton" ? "Birmingham City" : "Southampton";
        let logHtml = `<strong>${desc}</strong><br><br>`;
        
        // Player Score
        if (Math.random() < reward) {
            scores[playerTeam]++;
            logHtml += "<span class='goal-alert'>GOOOAL!! You've found the back of the net! ⚽</span><br>";
        }
        
        // Opponent Score (High danger!)
        if (Math.random() < risk) {
            scores[opponent]++;
            logHtml += `<span class='conceded-alert'>NIGHTMARE! ${opponent} score on the counter! 😱</span><br>`;
        }

        if (!logHtml.includes("score")) {
            logHtml += "The attack breaks down. The defenders clear it long.<br>";
        }

        // Add a random bit of extra commentary
        logHtml += `<br><span class='commentary'>[Radio] "${generalCommentary[Math.floor(Math.random()*generalCommentary.length)]}"</span>`;

        document.getElementById('s-score').innerText = scores["Southampton"];
        document.getElementById('b-score').innerText = scores["Birmingham City"];
        document.getElementById('log').innerHTML = logHtml;
        document.getElementById('choices').innerHTML = "<em>Processing the next phase...</em>";

        turn++;
        setTimeout(updateUI, 3000);
    }

    function endGame() {
        const opponent = playerTeam === "Southampton" ? "Birmingham City" : "Southampton";
        let finalStatus = "";
        if (scores[playerTeam] > scores[opponent]) finalStatus = "A HISTORIC VICTORY! 🎉";
        else if (scores[playerTeam] === scores[opponent]) finalStatus = "STALEMATE. It ends in a draw. 🤝";
        else finalStatus = "DEFEAT. The fans are heading for the exits early. 💔";

        document.getElementById('scenario').innerText = "FULL TIME!";
        document.getElementById('log').innerHTML = `<h2>${finalStatus}</h2><p>Final Score: ${scores["Southampton"]} - ${scores["Birmingham City"]}</p>`;
        document.getElementById('choices').innerHTML = '<button class="btn" onclick="location.reload()">REMATCH</button>';
    }
</script>
</body>
</html>
